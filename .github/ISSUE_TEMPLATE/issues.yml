name: "✨ Nouvelle fonctionnalité / tâche"
description: Créer une issue pour décrire une nouvelle fonctionnalité ou tâche à réaliser (Kanban)
title: "[Feature] "
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Nouvelle fonctionnalité / tâche
        Merci de décrire clairement la fonctionnalité que vous souhaitez ajouter.  
        Cette issue sera utilisée dans le cadre de notre gestion de projet **Kanban**.  

  - type: textarea
    id: feature-description
    attributes:
      label: Description de la fonctionnalité
      description: Explique la fonctionnalité ou tâche, pourquoi elle est nécessaire, et quel est son objectif.
      placeholder: "Exemple : En tant qu’utilisateur, je veux pouvoir filtrer les résultats afin de trouver rapidement ce que je cherche."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Critères d’acceptation
      description: Liste les conditions qui doivent être remplies pour considérer la fonctionnalité comme terminée.
      placeholder: |
        - [ ] Le filtre s’applique correctement aux résultats
        - [ ] Le design respecte la maquette
        - [ ] Les tests unitaires couvrent les cas principaux
    validations:
      required: false

  - type: textarea
    id: technical-notes
    attributes:
      label: Notes techniques / dépendances
      description: Détaille ici les contraintes techniques, dépendances, tickets liés ou autres remarques utiles.
      placeholder: "Exemple : dépend de l’issue #12"
    validations:
      required: false

  - type: dropdown
    id: kanban-column
    attributes:
      label: Colonne Kanban suggérée
      description: Choisis la colonne où placer cette issue dans le tableau Kanban.
      options:
        - Backlog
        - To do
        - In progress
        - Review
        - Done
    validations:
      required: false

  - type: input
    id: assignee
    attributes:
      label: Assigné (optionnel)
      description: Indique le ou les responsables de cette issue (ex: @utilisateur).
      placeholder: "@username"
    validations:
      required: false

  - type: input
    id: labels
    attributes:
      label: Labels (optionnel)
      description: Ajoute un ou plusieurs labels pour catégoriser cette issue.
      placeholder: "enhancement, frontend, backend, priority:high"
    validations:
      required: false
